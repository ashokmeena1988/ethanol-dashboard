<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCI Godown Map — Jabalpur Division</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column;background:#04080f;color:#e8f0fe;overflow:hidden}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#08111c,#0c1526);border-bottom:2px solid #f7b500;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:52px}
.logo-text{font-size:1rem;font-weight:700;color:#f7b500;letter-spacing:1px}
.logo-sub{font-size:.6rem;color:#4a6680;margin-top:2px}
.kpis{display:flex;gap:8px;margin-left:auto;align-items:center;flex-wrap:wrap}
.kp{background:rgba(16,29,48,.9);border:1px solid #1a3050;border-radius:7px;padding:3px 10px;text-align:center}
.kp-v{font-size:1rem;font-weight:700;color:#00c6ff}
.kp-l{font-size:.55rem;color:#4a6680;text-transform:uppercase}
.back-btn{padding:5px 12px;background:rgba(247,181,0,.1);border:1px solid rgba(247,181,0,.3);color:#f7b500;border-radius:7px;font-size:.72rem;cursor:pointer;text-decoration:none;white-space:nowrap}
.back-btn:hover{background:rgba(247,181,0,.2)}

/* FILTERS */
.filters{background:#060c16;border-bottom:1px solid #1a3050;padding:5px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#8ba3c4}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sep{width:1px;height:16px;background:#1a3050;flex-shrink:0;margin:0 4px}
select,input[type=text]{background:#0c1526;border:1px solid #1a3050;color:#e8f0fe;padding:4px 8px;border-radius:6px;font-size:.72rem;outline:none;font-family:Arial,sans-serif}
select:focus,input[type=text]:focus{border-color:#00c6ff}
input[type=text]{width:170px}
input[type=text]::placeholder{color:#4a6680}
.vc{font-size:.68rem;color:#4a6680;margin-left:auto}
.vc b{color:#00c6ff}

/* ROUTE PANEL */
.route-panel{background:#060c16;border-bottom:1px solid rgba(247,181,0,.2);padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.rlbl{font-size:.68rem;font-weight:700;color:#f7b500;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.rsel{background:#0c1526;border:1px solid rgba(247,181,0,.3);color:#e8f0fe;padding:4px 8px;border-radius:6px;font-size:.72rem;outline:none;font-family:Arial,sans-serif;min-width:200px;max-width:260px}
.rsel:focus{border-color:#f7b500}
.rbtn{padding:5px 14px;border-radius:6px;font-size:.72rem;cursor:pointer;border:1px solid;font-family:Arial,sans-serif;transition:background .2s;white-space:nowrap}
.rbtn-blue{background:rgba(0,198,255,.1);border-color:rgba(0,198,255,.3);color:#00c6ff}
.rbtn-blue:hover{background:rgba(0,198,255,.22)}
.rbtn-blue:disabled{opacity:.4;cursor:not-allowed}
.rbtn-green{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.3);color:#00e676;text-decoration:none;display:inline-block}
.rbtn-green:hover{background:rgba(0,230,118,.2)}
.rbtn-red{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.25);color:#ff4d6d}
.rbtn-red:hover{background:rgba(255,77,109,.18)}

/* Result card */
.rcard{background:rgba(0,198,255,.06);border:1px solid rgba(0,198,255,.25);border-radius:8px;padding:5px 14px;display:none;align-items:center;gap:12px;flex-wrap:wrap}
.rcard.show{display:flex}
.rstat{text-align:center;min-width:80px}
.rstat-v{font-size:1.1rem;font-weight:700;color:#00c6ff}
.rstat-l{font-size:.58rem;color:#4a6680;text-transform:uppercase}
.rdiv{width:1px;height:28px;background:rgba(0,198,255,.2)}

/* Spinner */
.spin-wrap{display:none;align-items:center;gap:6px;font-size:.73rem;color:#4a6680}
.spin-wrap.show{display:flex}
.spn{width:15px;height:15px;border:2px solid #1a3050;border-top-color:#00c6ff;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* MAP */
#map{flex:1;z-index:1}

/* Leaflet popup custom */
.lpop{font-family:Arial,sans-serif;min-width:200px}
.lpop h4{font-size:.85rem;color:#0055bb;border-bottom:2px solid #0055bb;padding-bottom:4px;margin-bottom:6px;line-height:1.3}
.lpop table{width:100%;border-collapse:collapse;font-size:.73rem}
.lpop td{padding:2px 0;border-bottom:1px solid #eee}
.lpop td:first-child{color:#666;width:45%}
.lpop td:last-child{font-weight:600;color:#222;text-align:right}
.lpop-btns{display:flex;gap:6px;margin-top:8px}
.lpop-btn{padding:3px 10px;font-size:.68rem;border-radius:5px;cursor:pointer;border:1px solid;font-family:Arial,sans-serif}
.lpop-btn-a{background:#fff3e0;color:#e65100;border-color:#e65100}
.lpop-btn-b{background:#e3f2fd;color:#0066cc;border-color:#0066cc}
</style>
</head>

<div class="filters">

  <div class="vc">दिख रहे: <b id="vcnt">157</b> / 157</div>
</div>

<!-- ROUTE TOOL -->
<div class="route-panel">
  <span class="rlbl">🛣️ Route Tool</span>
  <select class="rsel" id="fromSel"><option value="">— Godown A (From) चुनें —</option></select>
  <span style="color:#4a6680;font-size:.9rem;flex-shrink:0">→</span>
  <select class="rsel" id="toSel"><option value="">— Godown B (To) चुनें —</option></select>
  <button class="rbtn rbtn-blue" id="routeBtn" onclick="calcRoute()">🛣️ Route निकालें</button>
  <div class="spin-wrap" id="spinWrap"><div class="spn"></div><span>Route मिल रहा है...</span></div>
  <div class="rcard" id="rCard">
    <div class="rstat"><div class="rstat-v" id="rdist">—</div><div class="rstat-l">🛣️ सड़क दूरी</div></div>
    <div class="rdiv"></div>
    <div class="rstat"><div class="rstat-v" id="rtime">—</div><div class="rstat-l">⏱️ समय</div></div>
    <div class="rdiv"></div>
    <a class="rbtn rbtn-green" id="gmapLink" href="#" target="_blank">🗺️ Google Maps</a>
    <button class="rbtn rbtn-red" onclick="clearRoute()">✕ Clear</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

// ── MAP INIT ──
var map = L.map('map', {zoomControl:true}).setView([22.86, 79.93], 8);

}).addTo(map);

// ── ICON ──
function makeIcon(type, sel) {
  var c = COLORS[type] || '#fb8c00';
  var bdr = sel ? '3px solid #ff6600' : '2px solid rgba(0,0,0,.25)';
  var sz = sel ? 34 : 28;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+(sz*1.3)+'">'
    + '<path d="M'+(sz/2)+' 0 C'+(sz*.22)+' 0,0 '+(sz*.22)+',0 '+(sz*.5)
    + ' c0 '+(sz*.33)+','+(sz*.5)+' '+(sz*.8)+','+(sz*.5)+' '+(sz*.8)
    + ' S'+sz+' '+(sz*.83)+','+sz+' '+(sz*.5)
    + ' C'+sz+' '+(sz*.22)+','+(sz*.78)+' 0,'+(sz*.5)+' 0 z"'
    + ' fill="'+c+'" stroke="'+(sel?'#ff6600':'rgba(0,0,0,.3')+'" stroke-width="'+(sel?3:1)+'"/>'
    + '<circle cx="'+(sz*.5)+'" cy="'+(sz*.48)+'" r="'+(sz*.26)+'" fill="white" opacity=".95"/>'
    + '<text x="'+(sz*.5)+'" y="'+(sz*.55)+'" text-anchor="middle" font-size="'+(sz*.26)+'"'
    + ' font-weight="bold" fill="'+c+'" font-family="Arial">'+type.slice(0,3)+'</text>'
    + '</svg>';
  return L.divIcon({html:svg, className:'', iconSize:[sz,sz*1.3], iconAnchor:[sz/2,sz*1.3], popupAnchor:[0,-sz*1.3]});
}

// ── POPUP ──
function makePopup(g, idx) {
  var c = COLORS[g.type] || '#fb8c00';
  return '<div class="lpop">'
    + '<h4>🏭 '+g.name+'</h4>'
    + '<table>'
    + '<tr><td>District</td><td>'+g.dist+'</td></tr>'
    + '<tr><td>FSD</td><td>'+g.fsd+'</td></tr>'
    + '<tr><td>Type</td><td>'+g.type+'</td></tr>'
    + '<tr><td>Coordinates</td><td>'+g.lat.toFixed(4)+', '+g.lng.toFixed(4)+'</td></tr>'
    + '</table>'
    + '<div class="lpop-btns">'
    + '<button class="lpop-btn lpop-btn-a" onclick="setFrom('+idx+')">📍 From यहाँ से</button>'
    + '<button class="lpop-btn lpop-btn-b" onclick="setTo('+idx+')">🏁 To यहाँ तक</button>'
    + '</div></div>';
}

var mLayer = L.layerGroup().addTo(map);
var selFrom = null, selTo = null;
var routeLine = null, midLabel = null;

// ── BUILD MARKERS ──
function buildMarkers(list, idxMap) {
  mLayer.clearLayers();
  list.forEach(function(g, i) {
    var oi = idxMap ? idxMap[i] : i;
    var sel = (oi === selFrom || oi === selTo);
    L.marker([g.lat, g.lng], {icon: makeIcon(g.type, sel)})
      .bindPopup(makePopup(g, oi), {maxWidth:280})
      .addTo(mLayer);
  });
  document.getElementById('vcnt').textContent = list.length;
  document.getElementById('kVis').textContent = list.length;
  var dists = new Set(list.map(function(g){return g.dist;}));
  document.getElementById('kD').textContent = dists.size;
}

// ── FILTER ──
function applyFilter() {
  var d = document.getElementById('dF').value;
  var t = document.getElementById('tF').value;
  var s = document.getElementById('srch').value.toLowerCase();
  var res = [], idx = [];
  GODOWNS.forEach(function(g, i) {
    if (d && g.dist !== d) return;
    if (t && g.type !== t) return;
    if (s && g.name.toLowerCase().indexOf(s) < 0) return;
    res.push(g); idx.push(i);
  });
  buildMarkers(res, idx);
}

// ── SET FROM / TO from popup ──
function setFrom(i) {
  selFrom = i;
  document.getElementById('fromSel').value = i;
  map.closePopup(); applyFilter();
}
function setTo(i) {
  selTo = i;
  document.getElementById('toSel').value = i;
  map.closePopup(); applyFilter();
}

// ── ROUTE via OSRM ──
function calcRoute() {
  var fi = parseInt(document.getElementById('fromSel').value);
  var ti = parseInt(document.getElementById('toSel').value);
  if (isNaN(fi) || isNaN(ti) || fi === ti) {
    alert('कृपया दो अलग-अलग Godown चुनें!'); return;
  }
  selFrom = fi; selTo = ti; applyFilter();
  var gA = GODOWNS[fi], gB = GODOWNS[ti];

  clearRouteLines();
  document.getElementById('routeBtn').disabled = true;
  document.getElementById('spinWrap').classList.add('show');
  document.getElementById('rCard').classList.remove('show');

  var url = 'https://router.project-osrm.org/route/v1/driving/'
    + gA.lng + ',' + gA.lat + ';' + gB.lng + ',' + gB.lat
    + '?overview=full&geometries=geojson';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('routeBtn').disabled = false;
      document.getElementById('spinWrap').classList.remove('show');

      if (!data.routes || !data.routes.length) {
        alert('Route नहीं मिला।'); return;
      }
      var route = data.routes[0];
      var distKm = (route.distance / 1000).toFixed(1);
      var mins = Math.round(route.duration / 60);
      var hrs = Math.floor(mins / 60), rem = mins % 60;
      var tStr = hrs > 0 ? (hrs + ' घंटे ' + (rem ? rem + ' मिनट' : '')) : mins + ' मिनट';

      // Draw shadow + main line
      L.geoJSON(route.geometry, {style:{color:'#003366',weight:8,opacity:.25}}).addTo(map);
      routeLine = L.geoJSON(route.geometry, {style:{color:'#00c6ff',weight:5,opacity:.9}}).addTo(map);

      map.fitBounds(routeLine.getBounds(), {padding:[50,50]});

      // Midpoint label
      var coords = route.geometry.coordinates;
      var mid = coords[Math.floor(coords.length / 2)];
      midLabel = L.marker([mid[1], mid[0]], {
        icon: L.divIcon({
          html: '<div style="background:white;border:2px solid #00c6ff;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:#003399;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.3)">🛣️ ' + distKm + ' km &nbsp;|&nbsp; ⏱️ ' + tStr + '</div>',
          className:'', iconAnchor:[80, 14]
        })
      }).addTo(map);

      document.getElementById('rdist').textContent = distKm + ' km';
      document.getElementById('rtime').textContent = tStr;
      document.getElementById('gmapLink').href =
        'https://www.google.com/maps/dir/' + gA.lat + ',' + gA.lng + '/' + gB.lat + ',' + gB.lng;
      document.getElementById('rCard').classList.add('show');
    })
    .catch(function(e) {
      document.getElementById('routeBtn').disabled = false;
      document.getElementById('spinWrap').classList.remove('show');
      alert('Route fetch नहीं हो पाया। Internet check करें।');
    });
}

function clearRouteLines() {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (midLabel)  { map.removeLayer(midLabel);  midLabel  = null; }
  // Remove shadow layers too
  map.eachLayer(function(l) {
    if (l.options && l.options.color === '#003366') map.removeLayer(l);
  });
}

function clearRoute() {
  clearRouteLines();
  selFrom = null; selTo = null;
  document.getElementById('fromSel').value = '';
  document.getElementById('toSel').value = '';
  document.getElementById('rCard').classList.remove('show');
  document.getElementById('routeBtn').disabled = false;
  applyFilter();
  map.setView([22.86, 79.93], 8);
}

// ── DROPDOWNS ──
function populateDd() {
  var f = document.getElementById('fromSel');
  var t = document.getElementById('toSel');
  GODOWNS.forEach(function(g, i) {
    var o = new Option(g.name + ' (' + g.dist + ')', i);
    f.add(o.cloneNode(true));
    t.add(new Option(g.name + ' (' + g.dist + ')', i));
  });
}

// ── LEGEND ──
var leg = L.control({position:'bottomright'});
leg.onAdd = function() {
  var d = L.DomUtil.create('div');
  d.style.cssText = 'background:white;padding:10px 14px;border-radius:10px;font-size:11px;font-family:Arial;box-shadow:0 2px 10px rgba(0,0,0,.3);line-height:1.8';
  d.innerHTML = '<b style="color:#333;display:block;margin-bottom:4px">Godown Type</b>'
    + Object.entries(COLORS).map(function(e) {
        return '<div style="display:flex;align-items:center;gap:6px">'
          + '<div style="width:11px;height:11px;border-radius:50%;background:' + e[1] + '"></div>'
          + '<span style="color:#444">' + e[0] + '</span></div>';
      }).join('');
  return d;
};
leg.addTo(map);

// ── INIT ──
populateDd();
buildMarkers(GODOWNS, null);
document.getElementById('kTotal').textContent = GODOWNS.length;
</script>
